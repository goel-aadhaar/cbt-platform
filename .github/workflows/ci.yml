name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (saves CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # Dummy URL — only satisfies config validation and `prisma generate`.
      # Nothing actually connects in CI: unit tests and e2e mock PrismaService.
      # Real-DB integration tests arrive with the Docker/testcontainers phase.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @drsk/api lint

      - name: Typecheck
        run: pnpm --filter @drsk/api typecheck

      - name: Unit tests
        run: pnpm --filter @drsk/api test

      - name: E2E tests
        run: pnpm --filter @drsk/api test:e2e

      - name: Build
        run: pnpm --filter @drsk/api build
